<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riyu Exambro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #fff; overflow: hidden; }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1e88e5; display: flex; justify-content: center; align-items: center;
            z-index: 10000; animation: fadeOut 0.5s ease 0.5s forwards;
        }
        .white-box { background: white; width: 120px; height: 120px; border-radius: 30px; display: flex; justify-content: center; align-items: center; padding: 15px; }

        /* UI UTAMA */
        #main-ui { display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid #eee; }
        .header h1 { font-size: 20px; margin: 0; font-weight: 500; }
        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 35px; gap: 15px; }
        input { width: 100%; padding: 18px; border: 1.5px solid #999; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 40px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; background: #1e88e5; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-transform: uppercase; }

        /* --- BROWSER VIEW (SESUAI GAMBAR BARU) --- */
        #browser-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; flex-direction: column; }
        
        .browser-header { 
            background: #ffffff; 
            color: #555; 
            padding: 12px 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            font-size: 15px;
        }

        .browser-left { display: flex; align-items: center; gap: 5px; font-weight: 500; font-size: 17px; }
        .browser-right { display: flex; align-items: center; gap: 10px; color: #777; }
        
        .time-box { display: flex; align-items: center; gap: 4px; color: #4285f4; }
        .battery-box { display: flex; align-items: center; gap: 4px; color: #4285f4; }
        
        iframe { flex: 1; border: none; width: 100%; height: 100%; }

        /* SCANNER */
        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 6000; display: none; }
        #close-scanner { position: absolute; top: 20px; right: 20px; z-index: 6001; color: white; font-size: 30px; cursor: pointer; }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="white-box"><img src="exam.png" style="width:100%"></div>
    </div>

    <div id="main-ui">
        <header class="header">
            <h1>Riyu Exambro</h1>
            <div style="display:flex; gap:15px;"><i class="fas fa-th-large"></i> <i class="fas fa-history"></i> <i class="fas fa-info-circle"></i></div>
        </header>
        <div class="content">
            <input type="text" id="urlInput" placeholder="Masukkan URL">
            <button class="btn" onclick="jalankanBrowser()">AKSES URL</button>
            <button class="btn" onclick="mulaiScan()">
                <i class="fas fa-qrcode"></i> SCAN QR-CODE
            </button>
        </div>
    </div>

    <div id="browser-view">
        <div class="browser-header">
            <div class="browser-left">
                <span>Riyu Exambro</span>
            </div>
            <div class="browser-right">
                <div class="time-box">
                    <i class="far fa-clock"></i>
                    <span id="real-time">00:0</span>
                </div>
                <div class="battery-box">
                    <i class="fas fa-bolt"></i>
                    <span id="battery-level">0%</span>
                </div>
                <i class="fas fa-sign-out-alt" onclick="tutupBrowser()" style="margin-left: 5px; cursor: pointer;"></i>
            </div>
        </div>
        <iframe id="exam-frame" src=""></iframe>
    </div>

    <div id="reader"></div>
    <i class="fas fa-times" id="close-scanner" onclick="stopScan()" style="display:none;"></i>

    <script>
        // FUNGSI JAM REAL-TIME
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            // Format jam:menit sesuai gambar (contoh 22: 9)
            document.getElementById('real-time').innerText = `${hours}: ${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // FUNGSI BATERAI REAL-TIME
        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                function updateBattery() {
                    document.getElementById('battery-level').innerText = Math.round(battery.level * 100) + "%";
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        }

        function jalankanBrowser() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            if (!url.startsWith("http")) url = "https://" + url;
            document.getElementById('browser-view').style.display = 'flex';
            document.getElementById('exam-frame').src = url;
        }

        function tutupBrowser() {
            if(confirm("Apakah Anda yakin ingin keluar dari halaman ujian?")) {
                document.getElementById('browser-view').style.display = 'none';
                document.getElementById('exam-frame').src = "";
            }
        }

        // SCANNER LOGIC
        const scanner = new Html5Qrcode("reader");
        function mulaiScan() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('close-scanner').style.display = 'block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (hasil) => {
                document.getElementById('urlInput').value = hasil;
                stopScan();
                jalankanBrowser();
            }).catch(err => alert("Kamera Error"));
        }
        function stopScan() {
            scanner.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('close-scanner').style.display = 'none';
            });
        }
    </script>
</body>
</html>
