<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Riyu Exambro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif; background: #fff; overflow: hidden; 
        }

        /* 1. SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1e88e5; display: flex; justify-content: center; align-items: center;
            z-index: 10000; animation: fadeOut 0.5s ease 1.5s forwards;
        }
        .white-box { 
            background: white; width: 120px; height: 120px; border-radius: 30px; 
            display: flex; justify-content: center; align-items: center; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 2. UI UTAMA */
        #main-ui { display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; border-bottom: 1px solid #eee; }
        .header h1 { font-size: 20px; margin: 0; font-weight: 500; }
        
        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 35px; gap: 15px; }
        input { width: 100%; padding: 18px; border: 1.5px solid #999; border-radius: 10px; font-size: 16px; outline: none; }
        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 40px; 
            font-size: 14px; font-weight: bold; cursor: pointer; color: white; 
            background: #1e88e5; display: flex; align-items: center; 
            justify-content: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-transform: uppercase; 
        }

        /* 3. BROWSER VIEW (MODE UJIAN) */
        #browser-view { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; z-index: 9999; flex-direction: column; 
        }
        
        .browser-header { 
            background: #ffffff; color: #333; 
            padding: 10px 15px; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #ddd; height: 55px;
        }

        .browser-left { font-weight: bold; font-size: 16px; color: #444; }
        .browser-right { display: flex; align-items: center; gap: 10px; }
        
        .time-box, .battery-box { 
            display: flex; align-items: center; gap: 5px; 
            color: #4285f4; font-weight: bold; font-size: 14px;
        }
        
        /* Iframe diatur agar memenuhi sisa layar */
        iframe { flex: 1; border: none; width: 100%; height: 100%; }

        /* 4. SCANNER */
        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 11000; display: none; }
        #close-scanner { position: absolute; top: 20px; right: 20px; z-index: 11001; color: white; font-size: 30px; cursor: pointer; }

        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="white-box">
            <img src="exam.png" style="width:100%" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2641/2641409.png'">
        </div>
    </div>

    <div id="main-ui">
        <header class="header">
            <h1>Riyu Exambro</h1>
            <div style="display:flex; gap:15px;"><i class="fas fa-th-large"></i> <i class="fas fa-history"></i> <i class="fas fa-info-circle"></i></div>
        </header>
        <div class="content">
            <input type="text" id="urlInput" placeholder="Masukkan URL">
            <button class="btn" onclick="jalankanBrowser()">AKSES URL</button>
            <button class="btn" onclick="mulaiScan()">
                <i class="fas fa-qrcode"></i> SCAN QR-CODE
            </button>
        </div>
    </div>

    <div id="browser-view">
        <div class="browser-header">
            <div class="browser-left">Riyu Exambro</div>
            <div class="browser-right">
                <div class="time-box">
                    <i class="far fa-clock"></i>
                    <span id="real-time">00:00</span>
                </div>
                <div class="battery-box">
                    <i class="fas fa-bolt"></i>
                    <span id="battery-level">--%</span>
                </div>
                <i class="fas fa-sign-out-alt" onclick="tutupBrowser()" style="margin-left: 10px; font-size: 20px; cursor: pointer; color: #555;"></i>
            </div>
        </div>
        <iframe id="exam-frame" src="" allow="fullscreen; camera; microphone"></iframe>
    </div>

    <div id="reader"></div>
    <i class="fas fa-times" id="close-scanner" onclick="stopScan()" style="display:none;"></i>

    <script>
        // UPDATE JAM
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('real-time').innerText = `${h}:${m}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // UPDATE BATERAI
        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                const updateB = () => document.getElementById('battery-level').innerText = Math.round(battery.level * 100) + "%";
                updateB();
                battery.onlevelchange = updateB;
            });
        }

        // FUNGSI FULLSCREEN (Ditingkatkan untuk Webview)
        function toggleFullScreen(goFull) {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if(goFull) {
                if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                    requestFullScreen.call(docEl).catch(err => {
                        console.warn(`Gagal Fullscreen: ${err.message}`);
                    });
                }
            } else {
                if(doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement) {
                    cancelFullScreen.call(doc);
                }
            }
        }

        function jalankanBrowser() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            if (!url.startsWith("http")) url = "https://" + url;
            
            // 1. Aktifkan Fullscreen
            toggleFullScreen(true);
            
            // 2. Tampilkan Viewport
            document.getElementById('browser-view').style.display = 'flex';
            document.getElementById('exam-frame').src = url;

            // 3. Tambahan: Paksa scroll ke atas agar bar browser tersembunyi
            window.scrollTo(0, 1);
        }

        function tutupBrowser() {
            if(confirm("Keluar dari ujian?")) {
                toggleFullScreen(false);
                document.getElementById('browser-view').style.display = 'none';
                document.getElementById('exam-frame').src = "";
            }
        }

        // SCANNER LOGIC
        const scanner = new Html5Qrcode("reader");
        function mulaiScan() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('close-scanner').style.display = 'block';
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (hasil) => {
                document.getElementById('urlInput').value = hasil;
                stopScan();
                jalankanBrowser();
            }).catch(e => alert("Kamera Error: Gunakan HTTPS"));
        }
        
        function stopScan() {
            scanner.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('close-scanner').style.display = 'none';
            });
        }
    </script>
</body>
</html>
